<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Daily Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:16px;color:#222}
.tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:9px 24px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#555;cursor:pointer;font-size:14px;font-weight:500}
.tab.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
.cal-wrap{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-hdr{text-align:center;font-size:11px;color:#888;padding:6px 0;font-weight:600}
.cal-day{border-radius:8px;border:1px solid #e0e0e0;background:#fafafa;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 3px;min-height:60px;cursor:default}
.cal-day.has{background:#fff;border-color:#bbb;cursor:pointer}
.cal-day.has:hover{border-color:#1a73e8;background:#e8f0fe}
.cal-day.sel{border-color:#1a73e8;background:#e8f0fe}
.dnum{font-size:14px;font-weight:600;color:#222}
.cal-day:not(.has) .dnum{color:#bbb}
.dsub{font-size:10px;color:#888;margin-top:2px}
.occ-bar{width:32px;height:4px;border-radius:2px;background:#e0e0e0;margin-top:4px;overflow:hidden}
.occ-fill{height:100%;border-radius:2px}
.panel{margin-top:16px;background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.1);display:none}
.panel.show{display:block}
.panel-date{font-size:17px;font-weight:600;margin-bottom:16px;color:#111}
.section-lbl{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
.mg3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mg2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.mc{background:#f1f3f4;border-radius:8px;padding:12px 14px}
.ml{font-size:11px;color:#666;margin-bottom:4px}
.mv{font-size:20px;font-weight:600;color:#111}
.mv.pos{color:#137333}
.mv.neg{color:#c62828}
.mv.blue{color:#1a73e8}
.occ-track{height:10px;border-radius:5px;background:#e0e0e0;margin-top:8px;overflow:hidden}
.occ-track-fill{height:100%;border-radius:5px}
.divider{height:1px;background:#eee;margin:14px 0}
.ptbl{width:100%;font-size:13px;border-collapse:collapse}
.ptbl td{padding:7px 0;border-bottom:1px solid #f0f0f0}
.ptbl td:last-child{text-align:right;font-weight:600}
.ptbl tr:last-child td{border-bottom:none;font-weight:700;color:#111}
.bar-wrap{display:inline-block;width:80px;height:6px;background:#e8f0fe;border-radius:3px;vertical-align:middle;overflow:hidden}
.bar-inner{height:100%;background:#1a73e8;border-radius:3px}
.legend{display:flex;align-items:center;gap:16px;font-size:12px;color:#666;margin-bottom:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.leg-dot{width:10px;height:10px;border-radius:50%}
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="sw('January',this)">January 2026</div>
  <div class="tab" onclick="sw('February',this)">February 2026</div>
  <div class="tab" onclick="sw('March',this)">March 2026</div>
</div>

<div class="cal-wrap">
  <div class="legend">
    <div class="legend-item"><div class="leg-dot" style="background:#1a73e8"></div> High occupancy</div>
    <div class="legend-item"><div class="leg-dot" style="background:#fbbc04"></div> Mid occupancy</div>
    <div class="legend-item"><div class="leg-dot" style="background:#ea4335"></div> Low occupancy</div>
    <span style="color:#bbb">— Click a date to see details</span>
  </div>
  <div class="cal-grid" id="hdrs">
    <div class="cal-hdr">Sun</div><div class="cal-hdr">Mon</div><div class="cal-hdr">Tue</div>
    <div class="cal-hdr">Wed</div><div class="cal-hdr">Thu</div><div class="cal-hdr">Fri</div><div class="cal-hdr">Sat</div>
  </div>
  <div class="cal-grid" id="cal" style="margin-top:6px"></div>
</div>

<div class="panel" id="panel">
  <div class="panel-date" id="pdate"></div>

  <div class="section-lbl">Revenue</div>
  <div class="mg3" id="rev-cards"></div>

  <div class="divider"></div>
  <div class="section-lbl">Room statistics</div>
  <div class="mg3" id="room-cards"></div>
  <div id="occ-row" style="margin-top:10px"></div>

  <div class="divider"></div>
  <div class="section-lbl">Operations</div>
  <div class="mg2" id="ops-cards"></div>

  <div class="divider"></div>
  <div class="section-lbl">Payment breakdown</div>
  <table class="ptbl" id="ptbl"></table>
</div>

function mc(label,value,cls=''){return`<div class="mc"><div class="ml">${label}</div><div class="mv ${cls}">${value}</div></div>`;}

let cur='January',sel=null;

function getMap(m){const map={};D.filter(d=>d.month===m).forEach(d=>{if(!map[d.day])map[d.day]=d;});return map;}

function renderCal(m){
  const map=getMap(m),start=START[m],total=DAYS[m];
  let h='';
  for(let i=0;i<start;i++)h+='<div class="cal-day"></div>';
  for(let d=1;d<=total;d++){
    const r=map[d];
    if(r){
      const occ=r.occupancy_pct||0;
      const col=occColor(occ);
      h+=`<div class="cal-day has${sel===d?' sel':''}" onclick="pick(${d})">
        <div class="dnum">${d}</div>
        <div class="dsub" style="color:#555">${r.rooms_sold}/${r.rooms_available}</div>
        <div class="occ-bar"><div class="occ-fill" style="width:${Math.min(occ,100)}%;background:${col}"></div></div>
      </div>`;
    } else {
      h+=`<div class="cal-day"><div class="dnum">${d}</div></div>`;
    }
  }
  $('cal').innerHTML=h;
}

function pick(d){
  sel=d; renderCal(cur);
  const r=getMap(cur)[d]; if(!r) return;
  $('panel').style.display='block';
  $('pdate').textContent=r.date_display;
  const vCls=r.room_rate_variance>=0?'pos':'neg';
  $('rev-cards').innerHTML=
    mc('Total revenue',fmt(r.total_revenue))+
    mc('Room revenue',fmt(r.room_revenue))+
    mc('Room rate variance',(r.room_rate_variance>=0?'+':'')+fmt(r.room_rate_variance),vCls);
  const occ=r.occupancy_pct||0, col=occColor(occ);
  $('room-cards').innerHTML=
    mc('Rooms sold',r.rooms_sold+' / '+r.rooms_available,'blue')+
    mc('ADR',fmt(r.adr))+
    mc('RevPAR',fmt(r.revpar));
  $('occ-row').innerHTML=`<div class="mc" style="margin-top:10px"><div class="ml">Occupancy — ${occ}%</div><div class="occ-track" style="margin-top:8px"><div class="occ-track-fill" style="width:${Math.min(occ,100)}%;background:${col}"></div></div></div>`;
  $('ops-cards').innerHTML=
    mc('Check-ins today',r.checkins,'blue')+
    mc('No-shows',r.noshows,r.noshows>0?'neg':'');
  const pays=[['Cash',r.cash],['VISA',r.visa],['Master Card',r.master_card],['AMEX',r.amex],['Discover',r.discover]];
  const mx=Math.max(...pays.map(p=>Math.abs(p[1])),1);
  let rows=pays.map(([n,v])=>{
    const pct=Math.round(Math.abs(v)/mx*100);
    const col=v<0?'#c62828':'#111';
    return`<tr><td style="color:#666;width:100px">${n}</td><td><div class="bar-wrap"><div class="bar-inner" style="width:${pct}%"></div></div></td><td style="color:${col}">${v<0?'-':''}${fmt(v)}</td></tr>`;
  }).join('');
  rows+=`<tr><td colspan="2" style="color:#666;font-weight:700">All day total</td><td>${fmt(r.all_day_payment)}</td></tr>`;
  $('ptbl').innerHTML=rows;
}

function sw(m,el){
  cur=m; sel=null;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  $('panel').style.display='none';
  renderCal(m);
}

renderCal('January');
</script>
</body>
</html>
